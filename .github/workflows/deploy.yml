name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois ; on laisse celle en cours finir.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build avec Astro
        # withastro/action installe les dépendances, lance `astro build`
        # et téléverse l'artefact Pages depuis ./dist automatiquement.
        # node-version épinglé : Astro 6 exige Node >= 22.12 (le défaut de
        # l'action v3 est encore Node 20, qui ferait échouer le build).
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
